services:
  postgres:
    image: postgres:16-alpine
    container_name: pot-postgres
    environment:
      POSTGRES_USER: pot
      POSTGRES_PASSWORD: pot_dev_password
      POSTGRES_DB: proofoftransfer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
