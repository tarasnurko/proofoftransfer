[package]
name = "circuts"
type = "bin"
authors = ["Taras Nurko"]

[dependencies]
# Keccak256 for address hashing (Ethereum compatibility)
keccak256 = { tag = "v0.1.1", git = "https://github.com/noir-lang/keccak256" }

# Poseidon hash for Merkle trees (ZK-friendly)
poseidon = { tag = "v0.1.1", git = "https://github.com/noir-lang/poseidon" }